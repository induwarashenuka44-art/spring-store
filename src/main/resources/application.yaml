spring:
  application:
    name: store
  # Load project-root .env (KEY=value) when present; optional so the app still starts without the file.
  config:
    import: optional:file:.env[.properties]
  jwt:
    # HS256 needs a key with enough entropy (jjwt expects >= 256 bits). Set JWT_SECRET in .env or the environment for real use.
    secret: ${JWT_SECRET:local-dev-only-32char-secret-key!!}
    accessTokenExpiration: 7200 # 15m
    refreshTokenExpiration: 604800 # 7d
  profiles:
    active: dev
stripe:
  secretKey: ${STRIPE_SECRET_KEY}
  webhookSecretKey: ${STRIPE_WEBHOOK_SECRET_KEY}